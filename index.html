<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAJ - Nuestras Redes</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: white;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #1c1e21;
            margin-bottom: 5px;
            font-size: 28px;
        }
        p {
            color: #65676b;
            margin-bottom: 35px;
            font-size: 18px;
        }
        a.btn {
            display: block;
            width: 100%;
            padding: 16px 0;
            margin: 18px 0;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 18px;
            border-radius: 10px;
            transition: transform 0.15s, opacity 0.15s, box-shadow 0.15s;
            box-sizing: border-box;
        }
        a.btn:active {
            transform: scale(0.97);
        }
        a.btn:hover {
            opacity: 0.93;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .btn-instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        .btn-facebook {
            background-color: #1877F2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SMAJ</h1>
        <p>Elige tu plataforma preferida:</p>

        <a href="https://www.instagram.com/smajcuu?igsh=MTJ5b2Vnc3I3d3k4dA==" class="btn btn-instagram" target="_blank" rel="noopener noreferrer">
            Instagram
        </a>

        <a href="https://www.facebook.com/share/1Aqk91mmJF/?mibextid=wwXIfr" class="btn btn-facebook" target="_blank" rel="noopener noreferrer">
            Facebook
        </a>
    </div>
</body>
</html>
